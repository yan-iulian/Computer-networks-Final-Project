version: "3.9"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: debugger-server
    ports:
      - "5050:5050"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 5050)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
